services:
  edgecase-db:
    image: postgres:16
    environment:
      POSTGRES_USER: edgecase
      POSTGRES_PASSWORD: edgecase
      POSTGRES_DB: edgecase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgecase"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - edgecase-db-data:/var/lib/postgresql
    networks:
      - edgecase-net

  edgecase-toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    ports:
      - "8474:8474"
      - "5433:5433"
    depends_on:
      - edgecase-db
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8474/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edgecase-net

  edgecase-app:
    build:
      context: ./demo-app
      dockerfile: Containerfile
    environment:
      POSTGRES_HOST: edgecase-toxiproxy
      POSTGRES_PORT: "5433"
      POSTGRES_USER: edgecase
      POSTGRES_PASSWORD: edgecase
      POSTGRES_DB: edgecase
    ports:
      - "5001:5000"
    depends_on:
      - edgecase-toxiproxy-setup
      - edgecase-db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edgecase-net

  edgecase-backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      MCP_BASE_URL: http://edgecase-mcp:9100
      APP_BASE_URL: http://edgecase-app:5000
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir -r requirements.txt &&
        uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - edgecase-mcp
      - edgecase-app
    networks:
      - edgecase-net

  edgecase-mcp:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mcp-server:/app
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir -r requirements.txt &&
        uvicorn server:app --host 0.0.0.0 --port 9100
    ports:
      - "9100:9100"
    depends_on:
      - edgecase-toxiproxy
      - edgecase-db
      - edgecase-app
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edgecase-net

  edgecase-frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: ["python", "-m", "http.server", "5500"]
    ports:
      - "5500:5500"
    depends_on:
      - edgecase-backend
    networks:
      - edgecase-net

  edgecase-toxiproxy-setup:
    image: curlimages/curl:latest
    depends_on:
      - edgecase-toxiproxy
      - edgecase-db
    restart: "no"
    command:
      - sh
      - -c
      - |
        sleep 3
        curl -s -X POST http://edgecase-toxiproxy:8474/proxies -H "Content-Type: application/json" -d '{"name":"edgecase-db-proxy","listen":"0.0.0.0:5433","upstream":"edgecase-db:5432","enabled":true}'
    networks:
      - edgecase-net

networks:
  edgecase-net:

volumes:
  edgecase-db-data:
